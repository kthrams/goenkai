<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <circle cx="16" cy="16" r="15" fill="#F5F0E8"/>
  <g transform="translate(16,16)">
    <!-- Lotus petals radiating from center -->
    <ellipse cx="0" cy="-6.5" rx="3.2" ry="6.5" fill="#9D5F1B" opacity="0.85" transform="rotate(0)"/>
    <ellipse cx="0" cy="-6.5" rx="3.2" ry="6.5" fill="#9D5F1B" opacity="0.7" transform="rotate(60)"/>
    <ellipse cx="0" cy="-6.5" rx="3.2" ry="6.5" fill="#9D5F1B" opacity="0.55" transform="rotate(120)"/>
    <ellipse cx="0" cy="-6.5" rx="3.2" ry="6.5" fill="#9D5F1B" opacity="0.85" transform="rotate(180)"/>
    <ellipse cx="0" cy="-6.5" rx="3.2" ry="6.5" fill="#9D5F1B" opacity="0.7" transform="rotate(240)"/>
    <ellipse cx="0" cy="-6.5" rx="3.2" ry="6.5" fill="#9D5F1B" opacity="0.55" transform="rotate(300)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2.5" fill="#F5F0E8"/>
    <circle cx="0" cy="0" r="1.5" fill="#9D5F1B"/>
  </g>
</svg>
